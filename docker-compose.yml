services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: box-tournament-backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "4210:4210"
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    container_name: box-tournament-frontend
    restart: always
    ports:
      - "4310:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
